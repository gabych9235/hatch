name: 🐛 Bug Report
description: Something is broken in Hatch
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Before submitting:
        - Check [existing issues](https://github.com/adityaarsharma/hatch/issues) — your bug may already be reported
        - Check [docs/edge-cases.md](https://github.com/adityaarsharma/hatch/blob/main/docs/edge-cases.md) — your problem may be a known limitation with a documented workaround
        - For "how do I X?" questions, use [Discussions](https://github.com/adityaarsharma/hatch/discussions) instead

  - type: dropdown
    id: component
    attributes:
      label: Which component?
      options:
        - WordPress companion plugin (wp-plugin/)
        - Astro starter (astro-starter/)
        - A specific theme (themes/[name]/)
        - A specific module (modules/[name]/)
        - Claude Code plugin (claude-plugin/)
        - create-hatch CLI (packages/create-hatch/)
        - Documentation
        - Other / not sure
    validations:
      required: true

  - type: input
    id: hatch-version
    attributes:
      label: Hatch version
      description: From package.json or wp-plugin/hatch.php
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: 6.7
    validations:
      required: true

  - type: input
    id: hosting
    attributes:
      label: Where is your frontend hosted?
      placeholder: Cloudflare Workers / Vercel / VPS / Netlify / Local dev
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm create hatch@latest test-bug`
        2. Pick theme: magazine
        3. Run `npm run dev`
        4. Visit /blog → see error X
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste browser console errors, terminal output, or attach screenshots. Redact any secrets.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I checked existing issues
          required: true
        - label: I checked docs/edge-cases.md
          required: true
        - label: I redacted any secrets (env vars, passwords, tokens)
          required: true
